name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TypeScript dependencies
        working-directory: typescript
        run: npm ci

      - name: Python reducer tests
        run: python3 tests/test_reducer.py

      - name: Cross-language parity tests
        run: python3 tests/test_cli_parity.py

      - name: Rust sample run
        working-directory: rust
        run: cargo run -- ../examples/trivial_true.sky.json

      - name: Go sample run
        working-directory: go
        run: go run checker.go ../examples/trivial_true.sky.json

      - name: TypeScript sample run
        working-directory: typescript
        run: npx ts-node src/reducer.ts ../examples/trivial_true.sky.json
